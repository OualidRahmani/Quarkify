<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../styles/base.css">
    <link id="custom-css" rel="stylesheet" href="../styles/user.css">
</head>

<body>
    <div id="browser-shell">

        <aside id="sidebar">
            <div id="molecule-dock">
                <div class="molecule active" data-molecule="work" data-partition="work" title="Work">W</div>
                <div class="molecule" data-molecule="personal" data-partition="personal" title="Personal">P</div>
                <div class="molecule-add" id="new-molecule-btn" title="New Molecule">+</div>
                <div class="molecule" id="settings-btn" title="Settings">S</div>
            </div>

            <div id="atom-list">
                <span class="atom-title" id="current-molecule-title">Work molecule</span>

                <div id="quark-container">
                    <div class="quark active" data-id="quark-1" data-url="https://wikipedia.org" data-molecule="work">
                        Wikipedia</div>
                    <div class="quark" data-id="quark-2" data-url="https://github.com" data-molecule="work">GitHub</div>
                </div>

                <button id="new-quark-btn" class="add-btn">+ New Quark</button>
            </div>
        </aside>

        <main id="content">
            <header id="top-bar">
                <div id="nav-controls">
                    <button id="btn-back" class="nav-btn" title="Back">←</button>
                    <button id="btn-forward" class="nav-btn" title="Forward">→</button>
                    <button id="btn-refresh" class="nav-btn" title="Refresh">↻</button>
                </div>
                <input type="text" id="url-input" placeholder="Search or enter address..." />
            </header>

            <div id="webview-container"></div>
        </main>

    </div>

    <script src="./ui.js"></script>

        ipcRenderer.on('reload-styles', () => {
            const link = document.getElementById('custom-css');
            link.href = '../styles/user.css?v=' + Date.now();
        });
    </script> -->
</body>

</html>
